<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <table border="1" width="60%" cellpadding="5px" align="center">
            <tbody>
                <tr>
                    <th colspan="4"><h2>Registration Form</h2></th>
                </tr>
                <tr>
                    <td><label>Stuent Name</label></td>
                    <td><input type="text" placeholder="First Name"></td>
                    <td><input type="text" placeholder="Middle Name"></td>
                    <td><input type="text" placeholder="Last Name"></td>
                </tr>
                <tr>
                    <td><label>Father's Name</label></td>
                    <td><input type="text" placeholder="Enter Father's Name"></td>
                    <td><label>Mother's Name</label></td>
                    <td><input type="text" placeholder="Enter Mother's Name"></td>
                </tr>
                <tr>
                    <td><label>Date of Birth</label></td>
                    <td><input type="date"></td>
                    <td><label>Gender</label></td>
                    <td><label>Male</label><input type="radio"><label>Female</label><input type="radio"></td>
                </tr>
                <tr>
                    <td><label>Category</label></td>
                    <td><label>Gen</label><input type="radio"><label>OBC</label><input type="radio"><label>SC/ST</label><input type="radio"></td>
                    <td><label>Handicapped</label></td>
                    <td><label>Yes</label><input type="radio"><label>No</label><input type="radio"></td>
                </tr>
                <tr>
                    <td><label>Ex-Serviceman</label></td>
                    <td><input type="text"></td>
                    <td><label>Mobile No.</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label>State</label></td>
                    <td><select><option>Select any One</option><option>Uttar Pradesh</option>Madhya Pradesh</select></td>
                    <td><label>City</label></td>
                    <td><select><option>Select any One</option><option>Prayagraj</option><option>Kanpur</option><option>Bhopal</option></select></td>
                </tr>
                <tr>
                    <td><label>Upload Photo</label></td>
                    <td><input type="file"></td>
                    <td><label>Upload Signature</label></td>
                    <td><input type="file"></td>
                </tr>
                <tr>
                    <td></td>
                    <td colspan="3" align="center"><input type="submit"></td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
