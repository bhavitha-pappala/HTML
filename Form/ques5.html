<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table align="center" width="70%" cellpadding="10px" cellspacing="0">
        <tbody>
            <tr>
                <td rowspan="10"><img src="doc.webp" align="left" width="500px"></td>
                <td colspan="3"><h1 align="center">Doctor Appointment Form</h1><hr color="red"></td>
            </tr>
            <tr>
                <td>Appointment Date</td>
                <td colspan="2"><input type="date"></td>
            </tr>
            <tr>
                <td>Appointment Time</td>
                <td colspan="2"><input type="time"></td>
            </tr>
            <tr>
                <td>Name</td>
                <td colspan="2"><input type="text" placeholder="First"></td>
                <td colspan="2"><input type="text" placeholder="Last"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td colspan="2">Male<input type="radio" name="gender">Female<input type="radio" name="gender"></td>
            </tr>
            <tr>
                <td>Phone</td>
                <td colspan="2"><input type="text" placeholder="####"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td colspan="2"><input type="text" placeholder="city"></td>
                <td colspan="2"><input type="text" placeholder="state"></td>
            </tr>
            <tr>
                <td>Your Query</td>
                <td colspan="2"><textarea cols="40" rows="4"></textarea></td>
            </tr>
            <tr>
                <td valign="top">Appointment Type</td>
                <td colspan="2">Select which appointment type(s) you require<br><input type="checkbox">Cervix checkup<br><input type="checkbox">Heart checkup<br><input type="checkbox">Eye check-up<br><input type="checkbox">Hearing Test</td>
            </tr>
            <tr>
                <td></td>
                <td colspan="2" align="center"><input type="submit" value="Send"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
